name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json `packageManager` — single source
      # of truth shared with Cloudflare Pages (Corepack-style).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  audit:
    name: Production audit (must be 0 vulns)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json `packageManager` — single source
      # of truth shared with Cloudflare Pages (Corepack-style).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit --prod
        run: pnpm audit --prod

  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json `packageManager` — single source
      # of truth shared with Cloudflare Pages (Corepack-style).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm examples:build
      - name: Install Playwright browsers
        run: pnpm -C tests-e2e exec playwright install --with-deps chromium
      - name: Run e2e
        run: pnpm -C tests-e2e exec playwright test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: tests-e2e/playwright-report/
          retention-days: 7
