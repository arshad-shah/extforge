# Continuous integration for ExtForge.
#
# Runs on every push to `main` and every PR targeting `main`.
#
# Hardening:
# - All third-party actions are SHA-pinned. Comment after each pin records
#   the human-readable tag for review.
# - Top-level `permissions: contents: read` is the least-privilege default;
#   no job here writes anywhere.
# - `pnpm install --frozen-lockfile` to refuse drift in `pnpm-lock.yaml`.
# - `pnpm audit --prod` gates merges on a clean production dependency tree.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit & build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Compat data freshness
        if: matrix.node == '22'
        run: pnpm compat:check-freshness

  audit:
    name: Production audit (must be 0 vulns)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit --prod
        run: pnpm audit --prod

  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm examples:build
      - name: Install Playwright browsers
        run: pnpm -C tests-e2e exec playwright install --with-deps chromium
      - name: Run e2e
        run: pnpm -C tests-e2e exec playwright test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report-${{ matrix.os }}
          path: tests-e2e/playwright-report/
          retention-days: 7
