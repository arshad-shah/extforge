# Docs site build verification.
# Hardened: SHA-pinned third-party actions and least-privilege top-level
# permissions (matches the rest of the workflows in this repo).
name: Docs

on:
  pull_request:
    paths:
      - 'docs-site/**'
      - 'scripts/gen-*'
      - 'src/core/config/**'
      - 'src/core/errors/**'
      - 'src/core/plugins/**'
      - 'brand/**'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      # pnpm version comes from package.json `packageManager` — single source
      # of truth shared with Cloudflare Pages (Corepack-style).
      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:gen
      - name: Check generated content is up to date
        run: |
          if ! git diff --exit-code docs-site/src/content/docs/reference docs-site/src/styles/brand.css; then
            echo "::error::Generated docs are out of date. Run pnpm docs:gen and commit."
            exit 1
          fi
      - run: pnpm --filter extforge-docs build
